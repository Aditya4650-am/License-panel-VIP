<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ZENITSU VIP - Pro Dark Cyber Edition ⚡</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- Three.js for 3D Ambient Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-ultra-dark: #02060e;
            --panel-dark: rgba(6, 12, 24, 0.88);
            --panel-depth: #040814;
            
            /* Professional Blue & Green Dark Cyber Palette */
            --neon-blue: #0066ff;
            --neon-cyan: #00f0ff;
            --neon-green: #00ff66;
            --neon-dark-green: #00b348;
            --neon-red: #ff2a5f;
            
            /* High Contrast Dark/Bright Text Colors */
            --text-heading: #e6f7ff;
            --text-body: #a3c2e0;
            --text-muted: #5c7f9e;
            --text-dark-label: #00f0ff;
            
            --glass-border: rgba(0, 240, 255, 0.25);
            --glass-border-green: rgba(0, 255, 102, 0.25);
            
            /* Custom Zenitsu Background Image */
            --bg-image-url: url('6117533.jpg');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        body {
            background-color: var(--bg-ultra-dark);
            background-image: 
                radial-gradient(circle at 50% 20%, rgba(0, 102, 255, 0.15) 0%, rgba(2, 6, 14, 0.98) 80%),
                var(--bg-image-url);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-body);
            min-height: 100vh;
            padding: 30px 15px;
            overflow-x: hidden;
            position: relative;
        }

        /* 3D Animated Canvas Overlay */
        #threeCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header & Dynamic Glowing Text */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, var(--neon-blue) 50%, var(--neon-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(0, 240, 255, 0.4);
            animation: cyberPulse 3s infinite alternate;
        }

        @keyframes cyberPulse {
            0% { filter: drop-shadow(0 0 10px rgba(0, 102, 255, 0.5)); }
            100% { filter: drop-shadow(0 0 25px rgba(0, 255, 102, 0.8)); }
        }

        .live-clock {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 8px 24px;
            background: rgba(3, 8, 18, 0.9);
            border: 1px solid var(--neon-cyan);
            border-radius: 30px;
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.2), inset 0 0 10px rgba(0, 240, 255, 0.1);
        }

        /* 3D Dark Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(145deg, var(--panel-dark) 0%, var(--panel-depth) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
            backdrop-filter: blur(16px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8), 
                        inset 0 1px 0 rgba(0, 240, 255, 0.2),
                        0 5px 0 0 rgba(0, 102, 255, 0.4);
            transform: translateY(0);
        }

        .stat-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 102, 255, 0.3), 
                        inset 0 1px 0 rgba(0, 255, 102, 0.4),
                        0 8px 0 0 var(--neon-green);
            border-color: var(--neon-green);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-green), transparent);
            animation: borderSlide 3s infinite linear;
        }

        @keyframes borderSlide {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .stat-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .stat-card p {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            color: var(--text-heading);
            margin-top: 6px;
            text-shadow: 0 0 15px var(--neon-blue);
        }

        /* Dark Modern 3D Panels */
        .card {
            background: linear-gradient(160deg, var(--panel-dark) 0%, rgba(2, 6, 16, 0.95) 100%);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.85), 
                        inset 0 1px 1px rgba(255, 255, 255, 0.08),
                        inset 0 -2px 10px rgba(0, 0, 0, 0.8);
            position: relative;
        }

        .card:hover {
            border-color: rgba(0, 240, 255, 0.5);
            box-shadow: 0 25px 50px rgba(0, 102, 255, 0.25), 
                        inset 0 1px 2px rgba(0, 255, 102, 0.3);
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.35rem;
            color: var(--neon-cyan);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
            text-shadow: 0 0 12px rgba(0, 240, 255, 0.4);
        }

        /* Form Controls */
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark-label);
            margin-top: 14px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 16px;
            background: rgba(2, 6, 12, 0.9);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.8);
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--neon-green);
            box-shadow: 0 0 15px rgba(0, 255, 102, 0.3), inset 0 2px 5px rgba(0, 0, 0, 0.9);
            background: rgba(3, 10, 20, 0.95);
        }

        textarea {
            height: 130px;
            font-family: 'JetBrains Mono', monospace;
            resize: vertical;
        }

        /* Professional 3D Action Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(135deg, var(--neon-blue) 0%, var(--neon-dark-green) 100%);
            color: #ffffff;
            box-shadow: 0 6px 0 #003380, 0 10px 25px rgba(0, 255, 102, 0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.6);
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #003380, 0 15px 30px rgba(0, 255, 102, 0.5);
            background: linear-gradient(135deg, #0055ee 0%, var(--neon-green) 100%);
            color: #02060e;
            text-shadow: none;
        }

        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #003380, 0 5px 10px rgba(0, 255, 102, 0.2);
        }

        /* Dark Cyber Table & Badges */
        .table-responsive {
            overflow-x: auto;
            border-radius: 14px;
            border: 1px solid rgba(0, 240, 255, 0.2);
            background: rgba(2, 5, 10, 0.85);
            box-shadow: inset 0 0 15px rgba(0, 0, 0, 0.9);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 240, 255, 0.08);
        }

        th {
            background: rgba(4, 10, 22, 0.95);
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            border-bottom: 2px solid rgba(0, 240, 255, 0.3);
        }

        tr:hover {
            background: rgba(0, 240, 255, 0.04);
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            color: var(--neon-green);
            background: rgba(0, 255, 102, 0.08);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(0, 255, 102, 0.3);
            font-weight: 700;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .badge-active { 
            background: rgba(0, 255, 102, 0.12); 
            color: var(--neon-green); 
            border: 1px solid rgba(0, 255, 102, 0.4);
            box-shadow: 0 0 10px rgba(0, 255, 102, 0.2);
        }

        .badge-inactive { 
            background: rgba(255, 42, 95, 0.12); 
            color: var(--neon-red); 
            border: 1px solid rgba(255, 42, 95, 0.4);
            box-shadow: 0 0 10px rgba(255, 42, 95, 0.2);
        }

        .btn-action {
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-copy {
            background: rgba(0, 240, 255, 0.12);
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 240, 255, 0.35);
        }

        .btn-copy:hover {
            background: var(--neon-cyan);
            color: #02060e;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .btn-revoke {
            background: rgba(255, 42, 95, 0.12);
            color: var(--neon-red);
            border: 1px solid rgba(255, 42, 95, 0.3);
            margin-left: 6px;
        }

        .btn-revoke:hover {
            background: var(--neon-red);
            color: #fff;
            box-shadow: 0 0 15px var(--neon-red);
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 2rem; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <!-- 3D Ambient Background Canvas (Three.js with Dark Blue & Green Lighting) -->
    <div id="threeCanvas"></div>

    <div class="container">
        <div class="header">
            <h1>⚡ ZENITSU VIP CONTROL PANEL ⚡</h1>
            <div id="liveClock" class="live-clock">🕒 Loading System Time...</div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>📦 Loaded Scripts</h3>
                <p id="totalScripts">0</p>
            </div>
            <div class="stat-card">
                <h3>🔑 Total Generated Keys</h3>
                <p id="totalKeys">0</p>
            </div>
            <div class="stat-card">
                <h3>🟢 Active Licenses</h3>
                <p id="activeKeys">0</p>
            </div>
        </div>

        <div class="card">
            <h2>🚀 Deploy Script Payload</h2>
            <input type="text" id="scriptTitle" placeholder="Script Title (e.g., Township Elite v4)">
            <input type="text" id="scriptCategory" placeholder="Category" value="Township">
            <input type="text" id="scriptVersion" placeholder="Version" value="4.0">
            <textarea id="scriptContent" placeholder="Paste your raw Lua script payload code here..."></textarea>
            <button class="btn" onclick="uploadScript()">📤 Deploy Script Payload</button>
        </div>

        <div class="card">
            <h2>🔑 VIP Access Key Generator</h2>
            <label>Select Target Script Payload:</label>
            <select id="scriptSelect"></select>
            
            <label>Select Key Duration:</label>
            <select id="durationType">
                <option value="7days">⚡ 7 Days Access</option>
                <option value="1month" selected>🔥 1 Month (30 Days)</option>
                <option value="1year">💎 1 Year (365 Days)</option>
                <option value="lifetime">👑 Lifetime Access</option>
            </select>

            <label>Device Limit (HWID):</label>
            <input type="number" id="deviceLimit" placeholder="Device Limit" value="1">
            
            <label>Custom Key (Optional):</label>
            <input type="text" id="customKey" placeholder="Leave blank for automatic VIP-XXXX generation">
            
            <button class="btn" onclick="generateKey()">✨ Generate VIP Key</button>
        </div>

        <div class="card">
            <h2>📊 Active Licenses & Managed Keys</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Key Code</th>
                            <th>Linked Script</th>
                            <th>Duration</th>
                            <th>HWID Limit</th>
                            <th>Status</th>
                            <th>Quick Actions</th>
                        </tr>
                    </thead>
                    <tbody id="keysTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- 1. 3D Geometry Background with Dark Blue/Green Palette (Three.js) ---
        const container = document.getElementById('threeCanvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const geometries = [
            new THREE.IcosahedronGeometry(1.2, 0),
            new THREE.TorusGeometry(1, 0.3, 16, 100),
            new THREE.OctahedronGeometry(1)
        ];

        const shapes = [];
        for (let i = 0; i < 18; i++) {
            const geom = geometries[Math.floor(Math.random() * geometries.length)];
            const material = new THREE.MeshBasicMaterial({
                color: i % 2 === 0 ? 0x0066ff : 0x00ff66,
                wireframe: true,
                transparent: true,
                opacity: 0.2
            });
            const mesh = new THREE.Mesh(geom, material);
            mesh.position.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 15
            );
            mesh.rotSpeedX = (Math.random() - 0.5) * 0.008;
            mesh.rotSpeedY = (Math.random() - 0.5) * 0.008;
            scene.add(mesh);
            shapes.push(mesh);
        }

        camera.position.z = 8;

        function animate3D() {
            requestAnimationFrame(animate3D);
            shapes.forEach(shape => {
                shape.rotation.x += shape.rotSpeedX;
                shape.rotation.y += shape.rotSpeedY;
            });
            renderer.render(scene, camera);
        }
        animate3D();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 2. Live System Clock ---
        function updateClock() {
            const now = new Date();
            const options = { 
                weekday: 'short', 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: true 
            };
            document.getElementById('liveClock').innerHTML = "🕒 System Time: " + now.toLocaleString('en-US', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 3. Dashboard API Functions ---
        async function fetchDashboard() {
            try {
                const res = await fetch('/api/admin/dashboard');
                const data = await res.json();
                
                document.getElementById('totalScripts').innerText = data.totalScripts;
                document.getElementById('totalKeys').innerText = data.totalKeys;
                document.getElementById('activeKeys').innerText = data.activeKeys;

                const select = document.getElementById('scriptSelect');
                select.innerHTML = '<option value="">Select Target Script</option>';
                data.scripts.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.title} (v${s.version})</option>`;
                });

                const tbody = document.getElementById('keysTableBody');
                tbody.innerHTML = '';
                data.keys.forEach(k => {
                    let durationText = "⚡ " + k.duration_days + " Days";
                    if(k.duration_days >= 30000) durationText = "👑 Lifetime";
                    else if(k.duration_days === 365) durationText = "💎 1 Year";
                    else if(k.duration_days === 7) durationText = "⚡ 7 Days";

                    const statusBadge = k.is_active 
                        ? `<span class="badge badge-active">🟢 Active</span>` 
                        : `<span class="badge badge-inactive">🔴 Revoked</span>`;

                    const revokeBtn = k.is_active 
                        ? `<button class="btn-action btn-revoke" onclick="revokeKey('${k.key_code}')">🚫 Revoke</button>` 
                        : `<button class="btn-action" disabled style="opacity:0.35;">Cancelled</button>`;

                    tbody.innerHTML += `<tr>
                        <td><code>${k.key_code}</code></td>
                        <td>${k.script_name || 'Unlinked'}</td>
                        <td>${durationText}</td>
                        <td>${k.device_limit}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn-action btn-copy" onclick="copyKey('${k.key_code}')">📋 Copy</button>
                            ${revokeBtn}
                        </td>
                    </tr>`;
                });
            } catch (err) {
                console.error("Error loading dashboard data", err);
            }
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            alert("📋 Copied Key to Clipboard:\n" + key);
        }

        async function revokeKey(keyCode) {
            if(!confirm("Are you sure you want to revoke key:\n" + keyCode + "?")) return;

            const res = await fetch('/api/admin/keys/revoke', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ keyCode })
            });
            const data = await res.json();
            if(data.success) {
                alert("🚫 Key Revoked Successfully!");
                fetchDashboard();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        async function uploadScript() {
            const title = document.getElementById('scriptTitle').value;
            const category = document.getElementById('scriptCategory').value;
            const version = document.getElementById('scriptVersion').value;
            const content = document.getElementById('scriptContent').value;

            const res = await fetch('/api/admin/scripts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, category, version, content })
            });
            const data = await res.json();
            if(data.success) {
                alert("✅ Script Uploaded Successfully!");
                fetchDashboard();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        async function generateKey() {
            const scriptId = document.getElementById('scriptSelect').value;
            const durationType = document.getElementById('durationType').value;
            const deviceLimit = document.getElementById('deviceLimit').value;
            const customKey = document.getElementById('customKey').value;

            const res = await fetch('/api/admin/keys', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ scriptId, durationType, deviceLimit, customKey })
            });
            const data = await res.json();
            if(data.success) {
                alert("✨ VIP Key Generated Successfully:\n" + data.keyCode);
                fetchDashboard();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        fetchDashboard();
    </script>
</body>
</html>
