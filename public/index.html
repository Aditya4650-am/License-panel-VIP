<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ZENITSU VIP - Gamer Edition ⚡</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #050811;
            --neon-cyan: #00f0ff;
            --neon-purple: #7000ff;
            --neon-pink: #ff007f;
            --neon-gold: #ffaa00;
            --neon-green: #00ff66;
            --neon-red: #ff2a5f;
            --glass-bg: rgba(10, 15, 29, 0.75);
            --glass-border: rgba(0, 240, 255, 0.25);
            --text-main: #f0f6fc;
            --text-muted: #8b949e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
            transition: all 0.25s ease;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            min-height: 100vh;
            padding: 25px 15px;
            overflow-x: hidden;
            position: relative;
        }

        /* 3D Animated Background Canvas */
        #bgCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1050px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header & Title Effects */
        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: linear-gradient(135deg, var(--neon-cyan) 0%, #8b5cf6 50%, var(--neon-pink) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 240, 255, 0.4);
            animation: pulseGlow 3s infinite alternate;
        }

        @keyframes pulseGlow {
            0% { filter: drop-shadow(0 0 10px rgba(0, 240, 255, 0.3)); }
            100% { filter: drop-shadow(0 0 25px rgba(112, 0, 255, 0.7)); }
        }

        .live-clock {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 6px 20px;
            background: rgba(5, 8, 17, 0.85);
            border: 1px solid var(--neon-cyan);
            border-radius: 30px;
            color: var(--neon-cyan);
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.2), inset 0 0 10px rgba(0, 240, 255, 0.1);
        }

        /* Stats Cards - Gamer Style */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 25px;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            padding: 20px;
            text-align: center;
            backdrop-filter: blur(12px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon-cyan), transparent);
            animation: borderSlide 3s infinite linear;
        }

        @keyframes borderSlide {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .stat-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .stat-card p {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.2rem;
            font-weight: 900;
            color: #fff;
            margin-top: 6px;
            text-shadow: 0 0 12px var(--neon-cyan);
        }

        /* 3D Glassmorphism Cards */
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            backdrop-filter: blur(16px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.08);
            transform: perspective(1000px) rotateX(0deg);
        }

        .card:hover {
            border-color: rgba(0, 240, 255, 0.5);
            box-shadow: 0 20px 45px rgba(0, 240, 255, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.15);
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.25rem;
            color: var(--neon-cyan);
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
        }

        /* Inputs & Form Controls */
        label {
            display: block;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--text-muted);
            margin-top: 12px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        input, select, textarea {
            width: 100%;
            padding: 13px 16px;
            margin-bottom: 14px;
            background: rgba(5, 8, 17, 0.85);
            border: 1px solid rgba(0, 240, 255, 0.2);
            border-radius: 10px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.3);
            background: rgba(10, 15, 29, 0.95);
        }

        textarea {
            height: 120px;
            font-family: 'JetBrains Mono', monospace;
            resize: vertical;
        }

        /* 3D Animated Gamer Buttons */
        .btn {
            width: 100%;
            padding: 14px;
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background: linear-gradient(135deg, #00f0ff 0%, #7000ff 100%);
            color: #fff;
            box-shadow: 0 6px 20px rgba(0, 240, 255, 0.3);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:hover {
            transform: translateY(-2px) scale(1.01);
            box-shadow: 0 10px 30px rgba(112, 0, 255, 0.5);
            background: linear-gradient(135deg, #7000ff 0%, #00f0ff 100%);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Table & Action Buttons */
        .table-responsive {
            overflow-x: auto;
            border-radius: 12px;
            border: 1px solid rgba(0, 240, 255, 0.15);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th, td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        th {
            background: rgba(5, 8, 17, 0.95);
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-cyan);
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        tr:hover {
            background: rgba(0, 240, 255, 0.03);
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            color: var(--neon-gold);
            background: rgba(255, 170, 0, 0.12);
            padding: 4px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255, 170, 0, 0.25);
            font-weight: 700;
        }

        .badge {
            padding: 4px 10px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        .badge-active { 
            background: rgba(0, 255, 102, 0.15); 
            color: var(--neon-green); 
            border: 1px solid rgba(0, 255, 102, 0.3);
        }

        .badge-inactive { 
            background: rgba(255, 42, 95, 0.15); 
            color: var(--neon-red); 
            border: 1px solid rgba(255, 42, 95, 0.3);
        }

        .btn-action {
            padding: 6px 12px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }

        .btn-copy {
            background: rgba(0, 240, 255, 0.15);
            color: var(--neon-cyan);
            border: 1px solid rgba(0, 240, 255, 0.3);
        }

        .btn-copy:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 12px var(--neon-cyan);
        }

        .btn-revoke {
            background: rgba(255, 42, 95, 0.15);
            color: var(--neon-red);
            border: 1px solid rgba(255, 42, 95, 0.3);
            margin-left: 5px;
        }

        .btn-revoke:hover {
            background: var(--neon-red);
            color: #fff;
            box-shadow: 0 0 12px var(--neon-red);
        }

        @media (max-width: 650px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>
    <!-- Animated Particle Canvas Background -->
    <canvas id="bgCanvas"></canvas>

    <div class="container">
        <div class="header">
            <h1>⚡ ZENITSU VIP CONTROL PANEL ⚡</h1>
            <div id="liveClock" class="live-clock">🕒 Loading System Time...</div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>📦 Loaded Scripts</h3>
                <p id="totalScripts">0</p>
            </div>
            <div class="stat-card">
                <h3>🔑 Total Generated Keys</h3>
                <p id="totalKeys">0</p>
            </div>
            <div class="stat-card">
                <h3>🟢 Active Licenses</h3>
                <p id="activeKeys">0</p>
            </div>
        </div>

        <div class="card">
            <h2>🚀 Deploy Script Payload</h2>
            <input type="text" id="scriptTitle" placeholder="Script Title (e.g., Township Elite v4)">
            <input type="text" id="scriptCategory" placeholder="Category" value="Township">
            <input type="text" id="scriptVersion" placeholder="Version" value="4.0">
            <textarea id="scriptContent" placeholder="Paste your raw Lua script payload code here..."></textarea>
            <button class="btn" onclick="uploadScript()">📤 Deploy Script Payload</button>
        </div>

        <div class="card">
            <h2>🔑 VIP Access Key Generator</h2>
            <label>Select Target Script Payload:</label>
            <select id="scriptSelect"></select>
            
            <label>Select Key Duration:</label>
            <select id="durationType">
                <option value="7days">⚡ 7 Days Access</option>
                <option value="1month" selected>🔥 1 Month (30 Days)</option>
                <option value="1year">💎 1 Year (365 Days)</option>
                <option value="lifetime">👑 Lifetime Access</option>
            </select>

            <label>Device Limit (HWID):</label>
            <input type="number" id="deviceLimit" placeholder="Device Limit" value="1">
            
            <label>Custom Key (Optional):</label>
            <input type="text" id="customKey" placeholder="Leave blank for automatic VIP-XXXX generation">
            
            <button class="btn" onclick="generateKey()">✨ Generate VIP Key</button>
        </div>

        <div class="card">
            <h2>📊 Active Licenses & Managed Keys</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Key Code</th>
                            <th>Linked Script</th>
                            <th>Duration</th>
                            <th>HWID Limit</th>
                            <th>Status</th>
                            <th>Quick Actions</th>
                        </tr>
                    </thead>
                    <tbody id="keysTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- 1. Interactive Animated Particle Canvas Background ---
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const particles = [];
        const particleCount = 45;

        for (let i = 0; i < particleCount; i++) {
            particles.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                radius: Math.random() * 2 + 1,
                dx: (Math.random() - 0.5) * 0.6,
                dy: (Math.random() - 0.5) * 0.6,
                color: Math.random() > 0.5 ? '#00f0ff' : '#7000ff'
            });
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let i = 0; i < particles.length; i++) {
                let p = particles[i];
                p.x += p.dx;
                p.y += p.dy;

                if (p.x < 0 || p.x > canvas.width) p.dx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.dy *= -1;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = p.color;
                ctx.fill();

                // Draw connecting glow lines
                for (let j = i + 1; j < particles.length; j++) {
                    let p2 = particles[j];
                    let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (dist < 130) {
                        ctx.beginPath();
                        ctx.moveTo(p.x, p.y);
                        ctx.lineTo(p2.x, p2.y);
                        ctx.strokeStyle = `rgba(0, 240, 255, ${1 - dist / 130})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // --- 2. Live System Clock ---
        function updateClock() {
            const now = new Date();
            const options = { 
                weekday: 'short', 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: true 
            };
            document.getElementById('liveClock').innerHTML = "🕒 System Time: " + now.toLocaleString('en-US', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 3. Dashboard API Fetching & Management ---
        async function fetchDashboard() {
            try {
                const res = await fetch('/api/admin/dashboard');
                const data = await res.json();
                
                document.getElementById('totalScripts').innerText = data.totalScripts;
                document.getElementById('totalKeys').innerText = data.totalKeys;
                document.getElementById('activeKeys').innerText = data.activeKeys;

                const select = document.getElementById('scriptSelect');
                select.innerHTML = '<option value="">Select Target Script</option>';
                data.scripts.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.title} (v${s.version})</option>`;
                });

                const tbody = document.getElementById('keysTableBody');
                tbody.innerHTML = '';
                data.keys.forEach(k => {
                    let durationText = "⚡ " + k.duration_days + " Days";
                    if(k.duration_days >= 30000) durationText = "👑 Lifetime";
                    else if(k.duration_days === 365) durationText = "💎 1 Year";
                    else if(k.duration_days === 7) durationText = "⚡ 7 Days";

                    const statusBadge = k.is_active 
                        ? `<span class="badge badge-active">🟢 Active</span>` 
                        : `<span class="badge badge-inactive">🔴 Revoked</span>`;

                    const revokeBtn = k.is_active 
                        ? `<button class="btn-action btn-revoke" onclick="revokeKey('${k.key_code}')">🚫 Revoke</button>` 
                        : `<button class="btn-action" disabled style="opacity:0.35;">Cancelled</button>`;

                    tbody.innerHTML += `<tr>
                        <td><code>${k.key_code}</code></td>
                        <td>${k.script_name || 'Unlinked'}</td>
                        <td>${durationText}</td>
                        <td>${k.device_limit}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn-action btn-copy" onclick="copyKey('${k.key_code}')">📋 Copy</button>
                            ${revokeBtn}
                        </td>
                    </tr>`;
                });
            } catch (err) {
                console.error("Error loading dashboard data", err);
            }
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            alert("📋 Copied Key to Clipboard:\n" + key);
        }

        async function revokeKey(keyCode) {
            if(!confirm("Are you sure you want to revoke / cancel key:\n" + keyCode + "?")) return;

            const res = await fetch('/api/admin/keys/revoke', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ keyCode })
            });
            const data = await res.json();
            if(data.success) {
                alert("🚫 Key Revoked Successfully!");
                fetchDashboard();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        async function uploadScript() {
            const title = document.getElementById('scriptTitle').value;
            const category = document.getElementById('scriptCategory').value;
            const version = document.getElementById('scriptVersion').value;
            const content = document.getElementById('scriptContent').value;

            const res = await fetch('/api/admin/scripts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, category, version, content })
            });
            const data = await res.json();
            if(data.success) {
                alert("✅ Script Uploaded Successfully!");
                fetchDashboard();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        async function generateKey() {
            const scriptId = document.getElementById('scriptSelect').value;
            const durationType = document.getElementById('durationType').value;
            const deviceLimit = document.getElementById('deviceLimit').value;
            const customKey = document.getElementById('customKey').value;

            const res = await fetch('/api/admin/keys', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ scriptId, durationType, deviceLimit, customKey })
            });
            const data = await res.json();
            if(data.success) {
                alert("✨ VIP Key Generated Successfully:\n" + data.keyCode);
                fetchDashboard();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        fetchDashboard();
    </script>
</body>
</html>
