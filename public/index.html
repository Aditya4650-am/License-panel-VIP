<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENITSU VIP - Admin Panel</title>
    <style>
        body { font-family: Arial, sans-serif; background: #0f172a; color: #f8fafc; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #1e293b; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1, h2 { color: #38bdf8; text-align: center; margin-bottom: 5px; }
        .live-clock { text-align: center; color: #34d399; font-size: 15px; font-weight: bold; margin-bottom: 20px; background: #0f172a; padding: 8px; border-radius: 6px; border: 1px solid #334155; }
        .card { background: #334155; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        input, select, textarea, button { width: 100%; padding: 10px; margin-top: 8px; margin-bottom: 15px; background: #0f172a; border: 1px solid #475569; color: #fff; border-radius: 5px; box-sizing: border-box; }
        textarea { height: 120px; font-family: monospace; }
        button { background: #0284c7; font-weight: bold; cursor: pointer; border: none; }
        button:hover { background: #0369a1; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
        th, td { border: 1px solid #475569; padding: 8px; text-align: left; }
        th { background: #0f172a; color: #38bdf8; }
        .stats { display: flex; justify-content: space-around; text-align: center; }
        .stat-box { background: #0f172a; padding: 10px; border-radius: 5px; width: 30%; border: 1px solid #38bdf8; }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡ ZENITSU VIP Control Panel ⚡</h1>
        <div id="liveClock" class="live-clock">🕒 Loading precise time...</div>
        
        <div class="card stats">
            <div class="stat-box"><h3>📦 Scripts</h3><p id="totalScripts">0</p></div>
            <div class="stat-box"><h3>🔑 Total Keys</h3><p id="totalKeys">0</p></div>
            <div class="stat-box"><h3>🟢 Active Keys</h3><p id="activeKeys">0</p></div>
        </div>

        <div class="card">
            <h2>🚀 Upload New Script</h2>
            <input type="text" id="scriptTitle" placeholder="Script Title (e.g., Township Elite v4)">
            <input type="text" id="scriptCategory" placeholder="Category" value="Township">
            <input type="text" id="scriptVersion" placeholder="Version" value="4.0">
            <textarea id="scriptContent" placeholder="Paste your raw Lua script code here..."></textarea>
            <button onclick="uploadScript()">📤 Upload Script Payload</button>
        </div>

        <div class="card">
            <h2>🔑 Generate License Key</h2>
            <select id="scriptSelect"></select>
            
            <label>⏳ Select Duration Package:</label>
            <select id="durationType">
                <option value="7days">⚡ 7 Days Access</option>
                <option value="1month" selected>🔥 1 Month (30 Days)</option>
                <option value="1year">💎 1 Year (365 Days)</option>
                <option value="lifetime">👑 Lifetime Access</option>
            </select>

            <input type="number" id="deviceLimit" placeholder="Device Limit" value="1">
            <input type="text" id="customKey" placeholder="Custom Key (Optional - leave blank for auto VIP-XXXX)">
            <button onclick="generateKey()">✨ Generate VIP Key</button>
        </div>

        <div class="card">
            <h2>📊 Keys & Database Logs</h2>
            <div style="overflow-x:auto;">
                <table>
                    <thead>
                        <tr>
                            <th>🔑 Key Code</th>
                            <th>📜 Script Name</th>
                            <th>⏳ Duration</th>
                            <th>📱 Limit</th>
                            <th>⚡ Status</th>
                        </tr>
                    </thead>
                    <tbody id="keysTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // Professional Live Clock with Emojis
        function updateClock() {
            const now = new Date();
            const options = { 
                weekday: 'short', 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: true 
            };
            document.getElementById('liveClock').innerHTML = "🕒 System Time: " + now.toLocaleString('en-US', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchDashboard() {
            try {
                const res = await fetch('/api/admin/dashboard');
                const data = await res.json();
                
                document.getElementById('totalScripts').innerText = data.totalScripts;
                document.getElementById('totalKeys').innerText = data.totalKeys;
                document.getElementById('activeKeys').innerText = data.activeKeys;

                const select = document.getElementById('scriptSelect');
                select.innerHTML = '<option value="">Select Target Script</option>';
                data.scripts.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.title} (v${s.version})</option>`;
                });

                const tbody = document.getElementById('keysTableBody');
                tbody.innerHTML = '';
                data.keys.forEach(k => {
                    let durationText = "⚡ " + k.duration_days + " Days";
                    if(k.duration_days >= 30000) durationText = "👑 Lifetime";
                    else if(k.duration_days === 365) durationText = "💎 1 Year";
                    else if(k.duration_days === 7) durationText = "⚡ 7 Days";

                    tbody.innerHTML += `<tr>
                        <td><code>${k.key_code}</code></td>
                        <td>${k.script_name}</td>
                        <td>${durationText}</td>
                        <td>${k.device_limit}</td>
                        <td>${k.is_active ? '🟢 Active' : '🔴 Inactive'}</td>
                    </tr>`;
                });
            } catch (err) {
                console.error("Error loading dashboard data", err);
            }
        }

        async function uploadScript() {
            const title = document.getElementById('scriptTitle').value;
            const category = document.getElementById('scriptCategory').value;
            const version = document.getElementById('scriptVersion').value;
            const content = document.getElementById('scriptContent').value;

            const res = await fetch('/api/admin/scripts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, category, version, content })
            });
            const data = await res.json();
            if(data.success) {
                alert("✅ Script Uploaded Successfully!");
                fetchDashboard();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        async function generateKey() {
            const scriptId = document.getElementById('scriptSelect').value;
            const durationType = document.getElementById('durationType').value;
            const deviceLimit = document.getElementById('deviceLimit').value;
            const customKey = document.getElementById('customKey').value;

            const res = await fetch('/api/admin/keys', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ scriptId, durationType, deviceLimit, customKey })
            });
            const data = await res.json();
            if(data.success) {
                alert("✨ Key Generated Successfully: " + data.keyCode);
                fetchDashboard();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        fetchDashboard();
    </script>
</body>
</html>
