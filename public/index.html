<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ ZENITSU VIP - Gamer Edition ⚡</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Rajdhani:wght@500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
    <!-- Three.js for true 3D Canvas Background -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <style>
        :root {
            --bg-dark: #03050c;
            --neon-gold: #d97706;
            --neon-amber: #b45309;
            --neon-cyan: #0284c7;
            --neon-purple: #7e22ce;
            --neon-green: #15803d;
            --neon-red: #dc2626;
            
            /* Custom Zenitsu Background Image */
            --bg-image-url: url('6117533.jpg');
            
            --glass-bg: rgba(255, 255, 255, 0.88);
            --glass-border: rgba(255, 170, 0, 0.45);
            
            /* Dark Font Colors */
            --text-main: #0d1117;
            --text-muted: #484f58;
            --text-dark-heading: #161b22;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Rajdhani', sans-serif;
            transition: border-color 0.3s ease, box-shadow 0.3s ease;
        }

        body {
            background-color: var(--bg-dark);
            background-image: 
                radial-gradient(circle at center, rgba(3, 5, 12, 0.5) 0%, rgba(3, 5, 12, 0.95) 100%),
                var(--bg-image-url);
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            padding: 30px 15px;
            overflow-x: hidden;
            position: relative;
        }

        /* 3D Animated Canvas Overlay */
        #threeCanvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        /* Header & Title Effects */
        .header {
            text-align: center;
            margin-bottom: 35px;
        }

        .header h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.8rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 50%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 35px rgba(255, 170, 0, 0.6);
            animation: thunderPulse 2.5s infinite alternate;
        }

        @keyframes thunderPulse {
            0% { filter: drop-shadow(0 0 10px rgba(255, 170, 0, 0.4)); }
            100% { filter: drop-shadow(0 0 30px rgba(255, 215, 0, 0.9)); }
        }

        .live-clock {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 14px;
            padding: 8px 22px;
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid var(--neon-gold);
            border-radius: 30px;
            color: #78350f;
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 700;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.25);
        }

        /* Stats Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 22px;
            text-align: center;
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #d97706, transparent);
            animation: borderSlide 2.5s infinite linear;
        }

        @keyframes borderSlide {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .stat-card h3 {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            color: var(--text-muted);
            letter-spacing: 1.5px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .stat-card p {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.4rem;
            font-weight: 900;
            color: var(--text-dark-heading);
            margin-top: 6px;
        }

        /* Flat Interactive Cards (Tilt Disabled) */
        .card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        .card:hover {
            border-color: rgba(217, 119, 6, 0.8);
            box-shadow: 0 20px 45px rgba(255, 170, 0, 0.25);
        }

        .card h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.35rem;
            color: #78350f;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            letter-spacing: 1px;
            font-weight: 800;
        }

        /* Form Controls */
        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 800;
            color: var(--text-muted);
            margin-top: 14px;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input, select, textarea {
            width: 100%;
            padding: 14px 18px;
            margin-bottom: 16px;
            background: rgba(255, 255, 255, 0.95);
            border: 1px solid rgba(217, 119, 6, 0.4);
            border-radius: 12px;
            color: var(--text-main);
            font-size: 15px;
            font-weight: 700;
            outline: none;
        }

        input::placeholder, textarea::placeholder {
            color: #6e7681;
            font-weight: 500;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #d97706;
            box-shadow: 0 0 15px rgba(217, 119, 6, 0.3);
            background: #ffffff;
        }

        textarea {
            height: 130px;
            font-family: 'JetBrains Mono', monospace;
            resize: vertical;
        }

        /* Action Buttons */
        .btn {
            width: 100%;
            padding: 16px;
            font-family: 'Orbitron', sans-serif;
            font-size: 15px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: #ffffff;
            box-shadow: 0 8px 25px rgba(217, 119, 6, 0.4);
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(217, 119, 6, 0.6);
            background: linear-gradient(135deg, #d97706 0%, #b45309 100%);
        }

        .btn:active {
            transform: translateY(1px);
        }

        /* Table & Action Badges */
        .table-responsive {
            overflow-x: auto;
            border-radius: 14px;
            border: 1px solid rgba(217, 119, 6, 0.3);
            background: rgba(255, 255, 255, 0.95);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            color: var(--text-main);
        }

        th, td {
            padding: 16px 18px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
            font-weight: 700;
        }

        th {
            background: #f6f8fa;
            font-family: 'Orbitron', sans-serif;
            color: #78350f;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        tr:hover {
            background: rgba(255, 170, 0, 0.08);
        }

        code {
            font-family: 'JetBrains Mono', monospace;
            color: #92400e;
            background: rgba(245, 158, 11, 0.15);
            padding: 4px 10px;
            border-radius: 6px;
            border: 1px solid rgba(245, 158, 11, 0.4);
            font-weight: 700;
        }

        .badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-family: 'Orbitron', sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .badge-active { 
            background: rgba(21, 128, 61, 0.15); 
            color: #15803d; 
            border: 1px solid rgba(21, 128, 61, 0.4);
        }

        .badge-inactive { 
            background: rgba(220, 38, 38, 0.15); 
            color: #dc2626; 
            border: 1px solid rgba(220, 38, 38, 0.4);
        }

        .btn-action {
            padding: 7px 14px;
            font-size: 12px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            border: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-copy {
            background: rgba(217, 119, 6, 0.15);
            color: #b45309;
            border: 1px solid rgba(217, 119, 6, 0.4);
        }

        .btn-copy:hover {
            background: #d97706;
            color: #fff;
            box-shadow: 0 0 10px rgba(217, 119, 6, 0.5);
        }

        .btn-revoke {
            background: rgba(220, 38, 38, 0.15);
            color: #dc2626;
            border: 1px solid rgba(220, 38, 38, 0.4);
            margin-left: 6px;
        }

        .btn-revoke:hover {
            background: #dc2626;
            color: #fff;
            box-shadow: 0 0 10px rgba(220, 38, 38, 0.5);
        }

        @media (max-width: 768px) {
            .stats-grid { grid-template-columns: 1fr; }
            .header h1 { font-size: 2rem; }
            .card { padding: 20px; }
        }
    </style>
</head>
<body>
    <!-- Real 3D Ambient Background Canvas (Three.js) -->
    <div id="threeCanvas"></div>

    <div class="container">
        <div class="header">
            <h1>⚡ ZENITSU VIP CONTROL PANEL ⚡</h1>
            <div id="liveClock" class="live-clock">🕒 Loading System Time...</div>
        </div>
        
        <div class="stats-grid">
            <div class="stat-card">
                <h3>📦 Loaded Scripts</h3>
                <p id="totalScripts">0</p>
            </div>
            <div class="stat-card">
                <h3>🔑 Total Generated Keys</h3>
                <p id="totalKeys">0</p>
            </div>
            <div class="stat-card">
                <h3>🟢 Active Licenses</h3>
                <p id="activeKeys">0</p>
            </div>
        </div>

        <div class="card">
            <h2>🚀 Deploy Script Payload</h2>
            <input type="text" id="scriptTitle" placeholder="Script Title (e.g., Township Elite v4)">
            <input type="text" id="scriptCategory" placeholder="Category" value="Township">
            <input type="text" id="scriptVersion" placeholder="Version" value="4.0">
            <textarea id="scriptContent" placeholder="Paste your raw Lua script payload code here..."></textarea>
            <button class="btn" onclick="uploadScript()">📤 Deploy Script Payload</button>
        </div>

        <div class="card">
            <h2>🔑 VIP Access Key Generator</h2>
            <label>Select Target Script Payload:</label>
            <select id="scriptSelect"></select>
            
            <label>Select Key Duration:</label>
            <select id="durationType">
                <option value="7days">⚡ 7 Days Access</option>
                <option value="1month" selected>🔥 1 Month (30 Days)</option>
                <option value="1year">💎 1 Year (365 Days)</option>
                <option value="lifetime">👑 Lifetime Access</option>
            </select>

            <label>Device Limit (HWID):</label>
            <input type="number" id="deviceLimit" placeholder="Device Limit" value="1">
            
            <label>Custom Key (Optional):</label>
            <input type="text" id="customKey" placeholder="Leave blank for automatic VIP-XXXX generation">
            
            <button class="btn" onclick="generateKey()">✨ Generate VIP Key</button>
        </div>

        <div class="card">
            <h2>📊 Active Licenses & Managed Keys</h2>
            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Key Code</th>
                            <th>Linked Script</th>
                            <th>Duration</th>
                            <th>HWID Limit</th>
                            <th>Status</th>
                            <th>Quick Actions</th>
                        </tr>
                    </thead>
                    <tbody id="keysTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // --- 1. True 3D Floating Geometry Background (Three.js) ---
        const container = document.getElementById('threeCanvas');
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        container.appendChild(renderer.domElement);

        const geometries = [
            new THREE.IcosahedronGeometry(1.2, 0),
            new THREE.TorusGeometry(1, 0.3, 16, 100),
            new THREE.OctahedronGeometry(1)
        ];

        const shapes = [];
        for (let i = 0; i < 16; i++) {
            const geom = geometries[Math.floor(Math.random() * geometries.length)];
            const material = new THREE.MeshBasicMaterial({
                color: i % 2 === 0 ? 0xffaa00 : 0xffd700,
                wireframe: true,
                transparent: true,
                opacity: 0.25
            });
            const mesh = new THREE.Mesh(geom, material);
            mesh.position.set(
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 20,
                (Math.random() - 0.5) * 15
            );
            mesh.rotSpeedX = (Math.random() - 0.5) * 0.012;
            mesh.rotSpeedY = (Math.random() - 0.5) * 0.012;
            scene.add(mesh);
            shapes.push(mesh);
        }

        camera.position.z = 8;

        function animate3D() {
            requestAnimationFrame(animate3D);
            shapes.forEach(shape => {
                shape.rotation.x += shape.rotSpeedX;
                shape.rotation.y += shape.rotSpeedY;
            });
            renderer.render(scene, camera);
        }
        animate3D();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 2. Live System Clock ---
        function updateClock() {
            const now = new Date();
            const options = { 
                weekday: 'short', 
                year: 'numeric', 
                month: 'short', 
                day: 'numeric', 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: true 
            };
            document.getElementById('liveClock').innerHTML = "🕒 System Time: " + now.toLocaleString('en-US', options);
        }
        setInterval(updateClock, 1000);
        updateClock();

        // --- 3. Dashboard API Fetching & Management ---
        async function fetchDashboard() {
            try {
                const res = await fetch('/api/admin/dashboard');
                const data = await res.json();
                
                document.getElementById('totalScripts').innerText = data.totalScripts;
                document.getElementById('totalKeys').innerText = data.totalKeys;
                document.getElementById('activeKeys').innerText = data.activeKeys;

                const select = document.getElementById('scriptSelect');
                select.innerHTML = '<option value="">Select Target Script</option>';
                data.scripts.forEach(s => {
                    select.innerHTML += `<option value="${s.id}">${s.title} (v${s.version})</option>`;
                });

                const tbody = document.getElementById('keysTableBody');
                tbody.innerHTML = '';
                data.keys.forEach(k => {
                    let durationText = "⚡ " + k.duration_days + " Days";
                    if(k.duration_days >= 30000) durationText = "👑 Lifetime";
                    else if(k.duration_days === 365) durationText = "💎 1 Year";
                    else if(k.duration_days === 7) durationText = "⚡ 7 Days";

                    const statusBadge = k.is_active 
                        ? `<span class="badge badge-active">🟢 Active</span>` 
                        : `<span class="badge badge-inactive">🔴 Revoked</span>`;

                    const revokeBtn = k.is_active 
                        ? `<button class="btn-action btn-revoke" onclick="revokeKey('${k.key_code}')">🚫 Revoke</button>` 
                        : `<button class="btn-action" disabled style="opacity:0.35;">Cancelled</button>`;

                    tbody.innerHTML += `<tr>
                        <td><code>${k.key_code}</code></td>
                        <td>${k.script_name || 'Unlinked'}</td>
                        <td>${durationText}</td>
                        <td>${k.device_limit}</td>
                        <td>${statusBadge}</td>
                        <td>
                            <button class="btn-action btn-copy" onclick="copyKey('${k.key_code}')">📋 Copy</button>
                            ${revokeBtn}
                        </td>
                    </tr>`;
                });
            } catch (err) {
                console.error("Error loading dashboard data", err);
            }
        }

        function copyKey(key) {
            navigator.clipboard.writeText(key);
            alert("📋 Copied Key to Clipboard:\n" + key);
        }

        async function revokeKey(keyCode) {
            if(!confirm("Are you sure you want to revoke / cancel key:\n" + keyCode + "?")) return;

            const res = await fetch('/api/admin/keys/revoke', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ keyCode })
            });
            const data = await res.json();
            if(data.success) {
                alert("🚫 Key Revoked Successfully!");
                fetchDashboard();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        async function uploadScript() {
            const title = document.getElementById('scriptTitle').value;
            const category = document.getElementById('scriptCategory').value;
            const version = document.getElementById('scriptVersion').value;
            const content = document.getElementById('scriptContent').value;

            const res = await fetch('/api/admin/scripts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, category, version, content })
            });
            const data = await res.json();
            if(data.success) {
                alert("✅ Script Uploaded Successfully!");
                fetchDashboard();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        async function generateKey() {
            const scriptId = document.getElementById('scriptSelect').value;
            const durationType = document.getElementById('durationType').value;
            const deviceLimit = document.getElementById('deviceLimit').value;
            const customKey = document.getElementById('customKey').value;

            const res = await fetch('/api/admin/keys', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ scriptId, durationType, deviceLimit, customKey })
            });
            const data = await res.json();
            if(data.success) {
                alert("✨ VIP Key Generated Successfully:\n" + data.keyCode);
                fetchDashboard();
            } else {
                alert("❌ Error: " + data.error);
            }
        }

        fetchDashboard();
    </script>
</body>
</html>
