<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white font-sans min-h-screen p-4">
    <div class="max-w-3xl mx-auto space-y-6">
        <header class="border-b border-slate-800 pb-4">
            <h1 class="text-xl font-bold text-indigo-400">Application License Management</h1>
        </header>

        <!-- Product Registration -->
        <section class="bg-slate-900 p-4 rounded-lg border border-slate-800 space-y-3">
            <h2 class="text-md font-semibold text-slate-200">Register Product</h2>
            <div class="flex gap-2">
                <input id="productName" type="text" placeholder="Product Name" class="bg-slate-800 p-2 rounded text-sm flex-1 border border-slate-700">
                <button onclick="addProduct()" class="bg-indigo-600 hover:bg-indigo-500 px-4 py-2 rounded text-sm font-semibold">Add</button>
            </div>
        </section>

        <!-- Key Generation -->
        <section class="bg-slate-900 p-4 rounded-lg border border-slate-800 space-y-3">
            <h2 class="text-md font-semibold text-slate-200">Generate License Key</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-2">
                <select id="productSelect" class="bg-slate-800 p-2 rounded text-sm border border-slate-700"></select>
                <input id="customKey" type="text" placeholder="Custom Key (Optional)" class="bg-slate-800 p-2 rounded text-sm border border-slate-700">
                <input id="durationDays" type="number" value="30" placeholder="Duration (Days)" class="bg-slate-800 p-2 rounded text-sm border border-slate-700">
                <input id="deviceLimit" type="number" value="1" placeholder="Device Limit" class="bg-slate-800 p-2 rounded text-sm border border-slate-700">
            </div>
            <button onclick="generateKey()" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 rounded text-sm font-semibold">Generate</button>
        </section>

        <!-- Active Keys List -->
        <section class="bg-slate-900 p-4 rounded-lg border border-slate-800 space-y-3">
            <h2 class="text-md font-semibold text-slate-200">Active Keys</h2>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-xs">
                    <thead class="bg-slate-800 text-slate-400">
                        <tr>
                            <th class="p-2">Key</th>
                            <th class="p-2">Product</th>
                            <th class="p-2">Limit</th>
                            <th class="p-2">Status</th>
                        </tr>
                    </thead>
                    <tbody id="keysTable" class="divide-y divide-slate-800"></tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        async function loadProducts() {
            const res = await fetch('/api/admin/products');
            const products = await res.json();
            const select = document.getElementById('productSelect');
            select.innerHTML = products.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }

        async function loadKeys() {
            const res = await fetch('/api/admin/keys');
            const keys = await res.json();
            const tbody = document.getElementById('keysTable');
            tbody.innerHTML = keys.map(k => `
                <tr>
                    <td class="p-2 font-mono text-indigo-400">${k.key_code}</td>
                    <td class="p-2">${k.product_name || 'N/A'}</td>
                    <td class="p-2">${k.device_limit} Device(s)</td>
                    <td class="p-2"><span class="bg-emerald-500/20 text-emerald-400 px-2 py-0.5 rounded">Active</span></td>
                </tr>
            `).join('');
        }

        async function addProduct() {
            const name = document.getElementById('productName').value;
            await fetch('/api/admin/products', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name })
            });
            document.getElementById('productName').value = '';
            loadProducts();
        }

        async function generateKey() {
            const productId = document.getElementById('productSelect').value;
            const customKey = document.getElementById('customKey').value;
            const durationDays = parseInt(document.getElementById('durationDays').value);
            const deviceLimit = parseInt(document.getElementById('deviceLimit').value);

            const res = await fetch('/api/admin/keys', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ productId, customKey, durationDays, deviceLimit })
            });
            const data = await res.json();
            if (data.success) {
                loadKeys();
            } else {
                alert(data.error);
            }
        }

        loadProducts();
        loadKeys();
    </script>
</body>
</html>
